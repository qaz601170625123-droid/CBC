<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台登入中...</title>
    <style>
        body {
            background: #0a0a0a; color: #fff;
            font-family: sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }
        .msg { font-size: 18px; color: #C084FC; }
        .sub { font-size: 13px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <div>
        <div style="font-size:48px; margin-bottom:16px;">⏳</div>
        <div class="msg">後台登入驗證中...</div>
        <div class="sub">請稍候</div>
    </div>
    <script>
        // 這個 callback 邏輯跟原本的 callback.html 一樣，
        // 只是登入成功後跳回 admin.html 而非 index.html

        const LINE_CHANNEL_ID     = '2009077580';
        const LINE_CHANNEL_SECRET = 'c1fd0ca81619aebd10f21e43f0a139fd'; // ⚠️ 需填入你的 Channel Secret（或由後端處理）
        const APPS_SCRIPT_URL     = 'https://script.google.com/macros/s/AKfycbywjsDQeIkVbhg9Ah2Z62oWi4fx2WlOeQUhFP-CxtnPYBgOW0_eQ3qdccB4AISV8dIZ/exec';
        const ADMIN_URL           = './admin.html';

        (async () => {
            try {
                const params = new URLSearchParams(location.search);
                const code   = params.get('code');
                const state  = params.get('state');

                if (!code) {
                    alert('登入失敗：沒有取得授權碼');
                    location.href = ADMIN_URL;
                    return;
                }

                // 透過 Apps Script 換取 LINE 用戶資料
                // Apps Script 需支援 action=lineCallback
                const res = await fetch(
                    `${APPS_SCRIPT_URL}?action=lineCallback&code=${encodeURIComponent(code)}&redirectUri=${encodeURIComponent(location.origin + location.pathname)}`
                );
                const data = await res.json();

                if (!data.success || !data.profile) {
                    alert('取得用戶資料失敗，請重試');
                    location.href = ADMIN_URL;
                    return;
                }

                // 儲存管理員資料，跳回後台
                localStorage.setItem('admin_member', JSON.stringify({
                    lineId:      data.profile.userId,
                    displayName: data.profile.displayName,
                    pictureUrl:  data.profile.pictureUrl
                }));

                location.href = ADMIN_URL;

            } catch(e) {
                console.error(e);
                alert('登入過程發生錯誤：' + e.message);
                location.href = ADMIN_URL;
            }
        })();
    </script>
</body>
</html>
